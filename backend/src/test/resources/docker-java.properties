# Docker Engine 29+(Docker Desktop 4.52+)는 최소 API 버전이 1.44인데, Testcontainers 1.21의
# docker-java는 1.32로 고정 요청해 모든 전략이 400(BadRequest)으로 죽는다 —
# "Could not find a valid Docker environment"의 실제 원인이 이거다.
# https://github.com/testcontainers/testcontainers-java/issues/11210
# 근본 해결은 Testcontainers 2.x(버전 협상 지원) 업그레이드지만 Spring Boot 3.5 BOM이 1.21을
# 관리하므로 여기서는 API 버전만 핀한다. 1.44는 Docker 25(2024)+가 전부 지원해 CI에도 안전.
api.version=1.44
