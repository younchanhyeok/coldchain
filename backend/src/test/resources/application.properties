# 테스트 기본은 direct 모드 — M1~M5에 작성된 통합 테스트들은 "202 직후 조회 가능"(동기 저장)을
# 전제하고, direct는 M6 이후에도 지원 모드(A/B 토글)이므로 그 계약 그대로 검증한다.
# 주의: 이 값은 @ConditionalOnProperty(빈 조건) 평가 시점에 보여야 해서 DynamicPropertyRegistrar로는
# 안 된다(레지스트라 값은 조건 평가 이후에 적용) — 실측: 레지스트라만 썼더니 direct 컨텍스트가
# kafka 파이프라인으로 떠서 브로커 없는 send 타임아웃이 났다.
# kafka 경로 테스트는 @TestPropertySource로 이 값을 덮어쓴다(KafkaIngestPipelineIntegrationTest).
app.ingest.mode=direct
