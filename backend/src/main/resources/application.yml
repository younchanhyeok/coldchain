spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:coldchain}
    username: ${DB_USER:coldchain}
    password: ${DB_PASSWORD:coldchain}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}

app:
  alert:
    slack:
      # 미설정 시 발송을 건너뛰고 FAILED로 기록한다(가짜 성공 처리 안 함) — 로컬/CI 기본값.
      webhook-url: ${SLACK_WEBHOOK_URL:}

management:
  endpoints:
    web:
      exposure:
        include: health
