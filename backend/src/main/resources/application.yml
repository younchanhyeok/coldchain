spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:coldchain}
    username: ${DB_USER:coldchain}
    password: ${DB_PASSWORD:coldchain}
    hikari:
      # M6 부하테스트: 기본 10이 5000 트래커(1000rps × 리딩당 DB 왕복 4회)에서 상시 포화
      # (active 10/pending 2) → 수집 p99 462ms의 주 원인. PG max_connections(100) 안에서
      # 30으로 — 앱 풀 30 + psql/도구 여유. 더 키우기 전에 왕복 횟수 자체를 줄인다(Kafka 배치).
      maximum-pool-size: ${DB_POOL_SIZE:30}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest

server:
  port: ${SERVER_PORT:8080}

app:
  ingest:
    # kafka(M6~ 기본) | direct(M1~M5 동기 저장 — A/B 부하 비교용 토글).
    mode: ${INGEST_MODE:kafka}
  alert:
    slack:
      # 미설정 시 발송을 건너뛰고 FAILED로 기록한다(가짜 성공 처리 안 함) — 로컬/CI 기본값.
      webhook-url: ${SLACK_WEBHOOK_URL:}
  prediction:
    base-url: ${PREDICTION_BASE_URL:http://localhost:8000}
  frontend:
    # 매직링크 URL 조립에 쓰는 프론트 origin.
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  auth:
    # 미설정 시 어떤 값을 보내도 401 — 로컬/CI 기본값(가짜 통과 없음).
    admin-key: ${ADMIN_KEY:}
    # 미설정·32바이트 미만이면 기동 자체를 거부(JwtTokenProvider fail-fast) — 로컬 실행 시 JWT_SECRET 필수.
    jwt-secret: ${JWT_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    distribution:
      # 서버측 p50/p95/p99 — micrometer 기본 decay 윈도우(직전 ~2분) 기준이라 부하 종료 직후
      # 스냅샷이 정상상태(steady state)를 반영한다. 부하테스트 절차는 simulator/loadtest.sh.
      percentiles:
        "[http.server.requests]": 0.5, 0.95, 0.99
