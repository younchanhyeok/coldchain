services:
  postgres:
    image: postgis/postgis:16-3.4
    # pg_stat_statements — M6 부하테스트 병목 분석용(top query 캡처). preload만 여기서 걸고
    # CREATE EXTENSION은 loadtest.sh가 실행마다 보장한다(fresh 볼륨에서 사라지므로).
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    environment:
      POSTGRES_DB: ${DB_NAME:-coldchain}
      POSTGRES_USER: ${DB_USER:-coldchain}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-coldchain}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-coldchain} -d ${DB_NAME:-coldchain}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # M6: 수집 경로 큐 전환(PR3). KRaft 단일 노드(zookeeper 없음) — 로컬 개발 전용.
  # 리스너 2개: 컨테이너 내부용(kafka:19092)과 호스트의 백엔드 bootRun용(localhost:9092).
  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:19092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:19092,EXTERNAL://localhost:${KAFKA_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # 로컬 개발용 보존 상한 — 부하테스트가 수백만 건을 쌓아도 디스크를 무한 점유하지 않게.
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

volumes:
  postgres_data:
