services:
  postgres:
    # M6 PR4: TimescaleDB로 전환(NFR-4). ha 이미지는 TimescaleDB + PostGIS를 함께 담아
    # "한 DB에 시계열 hypertable + 공간"을 그대로 유지한다. 데이터 디렉터리가 표준 postgres와
    # 달라(/home/postgres/pgdata) 볼륨 이름도 timescale_data로 바꿨다 — 구(postgis) 볼륨을
    # 그대로 마운트하면 에러 없이 빈 DB로 initdb되는 무음 사고가 나므로 이름으로 구조적으로 차단.
    image: timescale/timescaledb-ha:pg16
    # timescaledb는 반드시 preload, pg_stat_statements는 부하테스트 top query 캡처용.
    # CREATE EXTENSION은 Flyway(V1 postgis, V11 timescaledb)가 하고, pg_stat_statements만
    # loadtest.sh가 실행마다 보장한다(fresh 볼륨에서 사라지므로).
    command: ["postgres", "-c", "shared_preload_libraries=timescaledb,pg_stat_statements"]
    environment:
      POSTGRES_DB: ${DB_NAME:-coldchain}
      POSTGRES_USER: ${DB_USER:-coldchain}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-coldchain}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - timescale_data:/home/postgres/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-coldchain} -d ${DB_NAME:-coldchain}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # M6: 수집 경로 큐 전환(PR3). KRaft 단일 노드(zookeeper 없음) — 로컬 개발 전용.
  # 리스너 2개: 컨테이너 내부용(kafka:19092)과 호스트의 백엔드 bootRun용(localhost:9092).
  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:19092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:19092,EXTERNAL://localhost:${KAFKA_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # 로컬 개발용 보존 상한 — 부하테스트가 수백만 건을 쌓아도 디스크를 무한 점유하지 않게.
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

volumes:
  timescale_data:
